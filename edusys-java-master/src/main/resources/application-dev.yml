server:
  port: 8080
spring:
  # 数据库地址池配置
  datasource:
    url: jdbc:mysql://localhost:3306/edusys
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      location: D:/javaproject/edusys/edusys-java/upload
      max-file-size: 10MB
  static-path-pattern: /** # 静态资源路径
  # redis相关配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      jedis:
        pool:
          max-active: 8
# 接口文档配置
springdoc:
  api-docs: # json文档配置
    path: /v3/api-docs
    enabled: true
  swagger-ui: # swagger页面配置
    path: /swagger-ui.html
    tags-sorter: alpha # api排序
    operations-sorter: alpha # http方法排序
    enabled: true
  group-configs: # 分组配置
    group: default
    paths-to-match: /**
    packages-to-scan: online.weiyin.edusys.controller
knife4j: # knife4j配置
  enable: false
  setting:
    language: zh_cn
# 日志配置
logging:
  config: classpath:logging/logback.xml
# 鉴权配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: edusys
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true